<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>シフト割当</title><link rel="stylesheet" href="../css/shift.css"></head><body><main class="app">
<header class="header"><div><p class="eyebrow">Staff Management System</p><h1>シフト割当画面</h1></div><span class="badge">Ver.5.0-4</span></header>
<section class="panel controls"><label class="field"><span>対象月</span><select id="targetMonth"></select></label><label class="field"><span>日付</span><select id="targetDate"></select></label><button id="loadBtn" class="primary" type="button">読み込み</button></section>
<section id="statusBox" class="status neutral">対象月と日付を選んで読み込んでください。</section>
<section class="layout"><section class="panel"><h2>時間ごとの割当</h2><p class="note">スタッフとして働ける先生だけが表示されます。保存済みシフトがある場合は自動でチェックが入ります。</p><div id="assignmentArea"></div></section>
<section class="panel"><h2>完成シフト</h2><p class="note">保存すると「完成シフト」シートに上書き保存されます。</p><div id="draftArea" class="empty">未割当です。</div><button id="clearBtn" class="secondary" type="button">リセット</button><button id="saveBtn" class="primary save-btn" type="button">完成シフトを保存</button></section></section>
</main><script src="../js/shift.js"></script></body></html>
