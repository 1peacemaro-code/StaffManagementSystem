<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタッフ管理システム｜シフト作成</title>
  <link rel="stylesheet" href="../css/schedule.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">Staff Management System</p>
        <h1>シフト作成画面</h1>
      </div>
      <span class="badge">Ver.4.8</span>
    </header>

    <section class="panel controls">
      <label class="field">
        <span>対象月</span>
        <select id="targetMonth"></select>
      </label>
      <label class="field">
        <span>日付</span>
        <select id="targetDate"></select>
      </label>
      <button id="loadBtn" class="primary" type="button">読み込み</button>
    </section>

    <section id="statusBox" class="status neutral">対象月と日付を選んで読み込んでください。</section>

    <section class="panel">
      <h2>時間別 入れる先生</h2>
      <p class="note">30分単位で、授業時間とSTANDARDを除いたスタッフ可能時間を表示します。</p>
      <div id="slotList" class="slot-list"></div>
    </section>

    <section class="panel">
      <h2>先生別 タイムライン</h2>
      <p class="note">緑がスタッフ可能時間です。</p>
      <div class="timeline-wrap">
        <div id="timeline" class="timeline"></div>
      </div>
    </section>
  </main>

  <script src="../js/schedule.js"></script>
</body>
</html>
