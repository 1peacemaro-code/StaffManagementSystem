<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタッフ管理システム｜ダッシュボード</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Staff Management System</p>
        <h1>スタッフ管理システム</h1>
        <p class="lead">提出確認・シフト作成・印刷・マスタ管理をここから操作します。</p>
      </div>
      <span class="version">Ver.5.3</span>
    </header>

    <section class="grid">
      <a class="card primary-card" href="index.html">
        <div class="icon">📝</div>
        <h2>先生提出画面</h2>
        <p>先生が勤務可能日を提出する画面。</p>
      </a>

      <a class="card" href="admin.html">
        <div class="icon">📊</div>
        <h2>提出データ確認</h2>
        <p>提出内容とスタッフ可能時間を日付別に確認。</p>
      </a>

      <a class="card" href="schedule.html">
        <div class="icon">🕒</div>
        <h2>時間割ビュー</h2>
        <p>30分ごとに入れる先生を確認。</p>
      </a>

      <a class="card primary-card" href="shift.html">
        <div class="icon">📅</div>
        <h2>シフト作成</h2>
        <p>スタッフとして働ける先生を選んで完成シフトを保存。</p>
      </a>

      <a class="card primary-card" href="print.html">
        <div class="icon">🖨️</div>
        <h2>印刷画面</h2>
        <p>完成シフトをA4横で印刷。</p>
      </a>

      <a class="card primary-card" href="master.html">
        <div class="icon">⚙️</div>
        <h2>マスタ管理</h2>
        <p>先生名の追加・表示切替・並び順を管理。</p>
      </a>
    </section>
  </main>
</body>
</html>
