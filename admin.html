<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタッフ管理システム｜管理画面</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">Staff Management System</p>
        <h1>管理画面</h1>
      </div>
      <span class="badge">Ver.4.7</span>
    </header>

    <section class="panel">
      <label class="field">
        <span>対象月</span>
        <select id="targetMonth"></select>
      </label>
      <button id="loadBtn" class="primary" type="button">読み込み</button>
    </section>

    <section id="statusBox" class="status neutral">対象月を選んで読み込んでください。</section>

    <section class="panel">
      <h2>日付別 スタッフ勤務可能時間</h2>
      <p class="note">勤務可能時間から、通常授業とSTANDARDを除いた時間を表示します。</p>
      <div id="resultArea" class="result"></div>
    </section>
  </main>

  <script src="../js/admin.js"></script>
</body>
</html>
